<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elizabeth Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: linear-gradient(180deg, #F5F5F7, #EAF2FF);
  font-family: 'Inter', sans-serif;
  color: #1D1D1F;
}

/* MENU */
.menu {
  position: fixed;
  top: 20px;
  right: 20px;
  font-size: 30px;
  cursor: pointer;
  z-index: 2000;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  top: 0;
  right: -100%;
  width: 260px;
  height: 100%;
  background: white;
  padding: 40px;
  transition: 0.4s;
  box-shadow: -10px 0 30px rgba(0,0,0,0.05);
  z-index: 1500;
}

.sidebar.active {
  right: 0;
}

.sidebar a {
  display: block;
  margin: 20px 0;
  cursor: pointer;
}

/* HERO */
.hero {
  display: flex;
  padding: 100px;
  align-items: center;
}

.badge {
  width: 260px;
  height: 380px;
  background: white;
  border-radius: 20px;
  box-shadow: 0 30px 60px rgba(0,0,0,0.1);
  transform: rotate(-5deg);
  overflow: hidden;
}

.badge img {
  width: 100%;
  height: 70%;
  object-fit: cover;
}

.badge-info {
  padding: 15px;
  background: linear-gradient(90deg, #EAF2FF, #FFF9DB);
}

.hero-text {
  margin-left: 60px;
}

h1 {
  font-family: 'Playfair Display';
  font-size: 56px;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  z-index: 3000;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
}

.modal-content {
  background: white;
  width: 400px;
  max-height: 80%;
  overflow-y: auto;
  margin: 10% auto;
  padding: 30px;
  border-radius: 20px;
  animation: popup 0.4s ease;
}

@keyframes popup {
  from {opacity:0; transform:scale(0.9);}
  to {opacity:1; transform:scale(1);}
}

.close {
  float: right;
  cursor: pointer;
  font-size: 20px;
}

.modal a {
  display: block;
  margin-top: 10px;
  color: #3A5BFF;
}

img.gallery {
  width: 100%;
  margin-top: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="menu" onclick="toggleMenu()">☰</div>

<div class="sidebar" id="sidebar">
<a onclick="openModal('about')">About</a>
<a onclick="openModal('projects')">Portfolio</a>
<a onclick="openModal('gallery')">Gallery</a>
<a onclick="openModal('contact')">Contact</a>
</div>

<!-- HERO -->
<div class="hero">
<div class="badge">
<img src="photo.jpg">
<div class="badge-info">
<strong>Elizabeth Labazanova</strong><br>
AI Specialist
</div>
</div>

<div class="hero-text">
<h1>AI & Business</h1>
<p>Future AI & Business Leader | IBM AI Certified</p>
</div>
</div>

<!-- UNIVERSAL MODAL -->
<div id="modal" class="modal">
  <div class="modal-content" id="modalContent">
    <span class="close" onclick="closeModal()">×</span>
    <div id="modalBody"></div>
  </div>
</div>

<script>
function toggleMenu() {
  document.getElementById("sidebar").classList.toggle("active");
}

function openModal(type) {
  toggleMenu();

  let content = "";

  if(type === "about") {
    content = `
    <h2>About</h2>
    <p>AI Training Specialist focused on ML, data annotation and intelligent systems.</p>
    `;
  }

  if(type === "projects") {
    content = `
    <h2>Projects</h2>
    <p>AI Model for prediction and analysis.</p>
    `;
  }

  if(type === "gallery") {
    content = `
    <h2>Gallery</h2>
    <img class="gallery" src="photo1.jpg">
    <img class="gallery" src="photo2.jpg">
    <img class="gallery" src="photo3.jpg">
    `;
  }

  if(type === "contact") {
    content = `
    <h2>Contact</h2>
    <a href="mailto:jikitoles@gmail.com">Email</a>
    <a href="https://www.instagram.com/ellizabetthi/">Instagram</a>
    <a href="https://www.linkedin.com/in/elizaveta-labazanova-438123390/">LinkedIn</a>
    `;
  }

  document.getElementById("modalBody").innerHTML = content;
  document.getElementById("modal").style.display = "block";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

window.onclick = function(event) {
  let modal = document.getElementById("modal");
  if(event.target == modal) {
    modal.style.display = "none";
  }
}
</script>

</body>
</html>
